<!-- Structured Data (Schema.org JSON-LD) -->
{{ if and .IsPage (ne .Section "talk") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "headline": {{ .Title | jsonify }},
  "description": {{ if .Description }}{{ .Description | jsonify }}{{ else }}{{ .Summary | plainify | truncate 200 | jsonify }}{{ end }},
  "author": {
    "@type": "Person",
    "name": "{{ .Site.Params.name }}",
    "jobTitle": "{{ .Site.Params.role }}",
    "url": "{{ .Site.BaseURL }}"
  },
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  {{ if .Params.image -}}
  "image": "{{ .Params.image | absURL }}",
  {{- else -}}
  "image": "{{ "img/icon-192.png" | absURL }}",
  {{- end }}
  "url": "{{ .Permalink }}"{{ with .Params.tags }},
  "keywords": "{{ delimit . ", " }}"{{ end }},
  "proficiencyLevel": "Beginner to Advanced",
  "dependencies": "R, Bioconductor{{ with .Params.tags }}, {{ delimit . ", " }}{{ end }}",
  "inLanguage": "en-US",
  "isAccessibleForFree": true,
  "publisher": {
    "@type": "Organization",
    "name": "{{ .Site.Title }}",
    "url": "{{ .Site.BaseURL }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ "img/icon-192.png" | absURL }}"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  }
}
</script>
{{ end }}

<!-- Event Schema for Talk Pages -->
{{ if and .IsPage (eq .Section "talk") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Event",
  "name": {{ .Title | jsonify }},
  "description": {{ if .Params.abstract }}{{ .Params.abstract | jsonify }}{{ else }}{{ .Title | jsonify }}{{ end }},
  "startDate": "{{ dateFormat "2006-01-02T15:04:05" .Params.time_start }}",
  {{ with .Params.time_end }}"endDate": "{{ dateFormat "2006-01-02T15:04:05" . }}",{{ end }}
  "location": {
    "@type": "Place",
    "name": {{ .Params.location | jsonify }}
  },
  "performer": {
    "@type": "Person",
    "name": "{{ .Site.Params.name }}",
    "jobTitle": "{{ .Site.Params.role }}",
    "url": "{{ .Site.BaseURL }}"
  },
  "organizer": {
    "@type": "Organization",
    "name": {{ .Title | jsonify }}
  },
  "url": "{{ .Permalink }}",
  "inLanguage": "en-US",
  "isAccessibleForFree": true
}
</script>
{{ end }}

<!-- Breadcrumb Schema -->
{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ .Site.BaseURL }}"
    },
    {{ if eq .Section "post" }}
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Blog Posts",
      "item": "{{ .Site.BaseURL }}post/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ .Title | jsonify }},
      "item": "{{ .Permalink }}"
    }
    {{ else if eq .Section "publication" }}
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Publications",
      "item": "{{ .Site.BaseURL }}publication/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ .Title | jsonify }},
      "item": "{{ .Permalink }}"
    }
    {{ else if eq .Section "talk" }}
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Talks & Teachings",
      "item": "{{ .Site.BaseURL }}talk/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ .Title | jsonify }},
      "item": "{{ .Permalink }}"
    }
    {{ else }}
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ .Title | jsonify }},
      "item": "{{ .Permalink }}"
    }
    {{ end }}
  ]
}
</script>
{{ end }}
